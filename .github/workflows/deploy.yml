name: Deploy naar TransIP

# Uitgeschakeld: TransIP shared hosting blokkeert inkomende SSH-verbindingen
# vanuit datacenter-IPs (waaronder GitHub Actions). Deploy loopt via
# scripts/deploy.sh op de lokale machine.
#
# Alleen nog handmatig via workflow_dispatch — laat staan voor toekomstig
# gebruik als we naar een VPS migreren.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /data/sites/web/dvborgercompagnienl/subsites/dorpshuisborgercompagnie.nl
            git pull origin main
            composer install --no-dev --optimize-autoloader
            vendor/bin/drush updb -y
            vendor/bin/drush cim -y
            vendor/bin/drush cr
